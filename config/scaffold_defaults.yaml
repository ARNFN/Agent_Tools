vue3_vite:

  template: vue

  package_manager: npm

  post_init:

    - npm install



springboot:

  group_id: com.example

  java_version: "17"

  boot_version: "3.5.15"

  dependencies:

    - web

    - data-jpa

    - mysql

  database:

    url_template: "jdbc:mysql://localhost:3306/{db_name}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8"

    username: root

    password: ""

    driver_class_name: com.mysql.cj.jdbc.Driver

    jpa:

      hibernate_ddl_auto: update

      show_sql: true

  post_init:

    - mvnw.cmd -q dependency:resolve


